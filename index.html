<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honeyman Ice Cream — Live Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --honey-50: #fffbeb;
  --honey-100: #fef3c7;
  --honey-200: #fde68a;
  --honey-300: #fcd34d;
  --honey-400: #fbbf24;
  --honey-500: #f59e0b;
  --honey-600: #d97706;
  --honey-700: #b45309;
  --honey-800: #92400e;
  --honey-900: #78350f;
  --cream: #fefcf3;
  --cream-dark: #faf5e4;
  --brown-50: #fdf8f0;
  --brown-100: #f5e6d0;
  --brown-200: #e8d0a8;
  --brown-700: #6b4423;
  --brown-800: #4a2f17;
  --brown-900: #3b220f;
  --green: #16a34a;
  --green-light: #dcfce7;
  --red: #dc2626;
  --red-light: #fee2e2;
  --blue: #2563eb;
  --purple: #7c3aed;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background-color: #3c2a14;
  color: #fff;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(251,191,36,.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(217,119,6,.08) 0%, transparent 50%);
}

/* Keep default text white without breaking semantic status colors */
body, p, span, div, th, td, li, label, small, strong, em, h1, h2, h3, h4, h5, h6, a {
  color:#fff;
}

/* Dark-theme button visibility override */
button,
.btn-map,
.btn-close-detail,
.detail-tab {
  background:rgba(255,255,255,.14) !important;
  border:1px solid rgba(255,255,255,.45) !important;
  color:#fff !important;
}

button:hover,
.btn-map:hover,
.btn-close-detail:hover,
.detail-tab:hover,
.detail-tab.active {
  background:rgba(255,255,255,.24) !important;
  border-color:rgba(255,255,255,.7) !important;
  color:#fff !important;
}

/* ===== LOADER ===== */
.loader-overlay {
  position:fixed; inset:0; background:var(--cream);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:9999; transition:opacity .6s;
}
.loader-overlay.hidden { opacity:0; pointer-events:none; }
.loader-honeycomb { position:relative; width:60px; height:60px; }
.loader-honeycomb::before, .loader-honeycomb::after {
  content:''; position:absolute; width:20px; height:20px;
  background:var(--honey-400); border-radius:4px;
  animation: honeySpin 1.2s ease-in-out infinite;
}
.loader-honeycomb::before { top:0; left:20px; animation-delay:0s; }
.loader-honeycomb::after { bottom:0; left:20px; animation-delay:.4s; }
.loader-hex1, .loader-hex2 {
  position:absolute; width:20px; height:20px;
  background:var(--honey-500); border-radius:4px;
  animation: honeySpin 1.2s ease-in-out infinite;
}
.loader-hex1 { top:20px; left:0; animation-delay:.2s; }
.loader-hex2 { top:20px; right:0; animation-delay:.6s; }
@keyframes honeySpin {
  0%,100% { transform:scale(1); opacity:1; }
  50% { transform:scale(.5); opacity:.4; }
}
.loader-text { margin-top:20px; color:var(--brown-700); font-size:14px; font-weight:400; }

/* ===== HEADER ===== */
header {
  padding:20px 32px;
  display:flex; align-items:center; justify-content:space-between;
  background: linear-gradient(135deg, var(--honey-600) 0%, var(--honey-500) 40%, var(--honey-400) 100%);
  box-shadow: 0 4px 24px rgba(180,83,9,.18);
  position:sticky; top:0; z-index:100;
}
.brand { display:flex; align-items:center; gap:14px; }
.brand-icon {
  width:48px; height:48px; border-radius:14px;
  background: rgba(255,255,255,.2); backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center;
  font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:700; color:#fff;
  border: 1px solid rgba(255,255,255,.3);
}
.brand h1 {
  font-family:'Cormorant Garamond',serif;
  font-size:24px; font-weight:700; color:#fff; letter-spacing:.3px;
}
.brand span { font-size:12px; color:rgba(255,255,255,.75); display:block; margin-top:2px; font-weight:300; }
.header-right { display:flex; align-items:center; gap:14px; }
.sync-status {
  display:flex; align-items:center; gap:6px;
  font-size:12px; color:rgba(255,255,255,.8);
  padding:7px 14px; border-radius:20px;
  background:rgba(255,255,255,.15); backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.2);
}
.sync-dot { width:7px; height:7px; border-radius:50%; background:#4ade80; }
.sync-dot.error { background:#f87171; }
.sync-dot.loading { background:#fff; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.btn-refresh {
  padding:8px 18px; border-radius:10px; border:1px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.15); backdrop-filter:blur(6px);
  color:#fff; cursor:pointer; font-size:13px; font-family:inherit;
  font-weight:500; transition:all .2s;
}
.btn-refresh:hover { background:rgba(255,255,255,.3); }

/* ===== DASHBOARD ===== */
.dashboard { padding:28px 32px; max-width:1480px; margin:0 auto; }

/* ===== KPI CARDS ===== */
.kpi-grid {
  display:grid; grid-template-columns:repeat(auto-fit, minmax(195px,1fr));
  gap:14px; margin-bottom:28px;
}
.kpi-card {
  background:#3c2a14;
  border:1px solid var(--brown-100);
  border-radius:16px; padding:20px;
  position:relative; overflow:hidden;
  transition:transform .25s, box-shadow .25s;
  box-shadow: 0 1px 4px rgba(120,53,15,.06);
}
.kpi-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(180,83,9,.1); }
.kpi-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:var(--card-accent, var(--honey-400));
}
.kpi-label {
  font-size:11px; text-transform:uppercase; letter-spacing:1.4px;
  color:#fde68a; margin-bottom:8px; font-weight:500;
}
.kpi-value {
  font-family:'Cormorant Garamond',serif; font-size:36px; font-weight:700;
  line-height:1;
}
.kpi-sub { font-size:11px; color:var(--brown-200); margin-top:6px; font-weight:400; }

/* ===== CARDS ===== */
.card {
  background:#3c2a14; border:1px solid var(--brown-100);
  border-radius:16px; padding:22px;
  box-shadow:0 1px 4px rgba(120,53,15,.06);
}
.section-title {
  font-family:'Cormorant Garamond',serif;
  font-size:19px; font-weight:600; margin-bottom:16px;
  padding-bottom:10px; border-bottom:2px solid var(--honey-200);
  display:flex; align-items:center; gap:10px; color:#fde68a;
}
.badge {
  font-family:'Outfit'; font-size:11px; font-weight:600;
  padding:3px 11px; border-radius:12px;
  background:rgba(251,191,36,.22); color:#fde68a;
}

.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:28px; }

/* ===== MODEL CARDS (Clickable) ===== */
.model-cards-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(170px,1fr));
  gap:12px;
}
.model-card {
  background:#3c2a14; border:2px solid var(--brown-100);
  border-radius:14px; padding:18px 16px;
  cursor:pointer; transition:all .25s; text-align:center;
  position:relative;
}
.model-card:hover { border-color:var(--honey-400); transform:translateY(-2px); box-shadow:0 6px 20px rgba(180,83,9,.1); }
.model-card.active { border-color:var(--honey-500); background:rgba(251,191,36,.16); box-shadow:0 6px 20px rgba(180,83,9,.12); }
.model-card-icon {
  width:42px; height:42px; border-radius:12px; margin:0 auto 10px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:700; color:#fff;
}
.model-card-name { font-size:13px; font-weight:600; color:#fde68a; margin-bottom:4px; }
.model-card-count {
  font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:700;
  color:var(--honey-700);
}
.model-card-label { font-size:10px; color:var(--brown-200); text-transform:uppercase; letter-spacing:1px; }

/* ===== EXPANDED DETAIL PANEL ===== */
.model-detail-panel {
  margin-top:16px; background:#3c2a14;
  border:2px solid var(--honey-300); border-radius:16px;
  overflow:hidden; animation:slideDown .35s ease;
}
@keyframes slideDown { from{opacity:0;max-height:0} to{opacity:1;max-height:3000px} }
.model-detail-header {
      padding:16px 20px; background:#3c2a14;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--honey-200);
}
.model-detail-header h3 {
  font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:700;
  color:#fde68a;
}
.btn-close-detail {
  width:30px; height:30px; border-radius:8px; border:none;
  background:var(--honey-200); color:var(--brown-800); cursor:pointer;
  font-size:16px; font-weight:700; display:flex; align-items:center; justify-content:center;
  transition:background .2s;
}
.btn-close-detail:hover { background:var(--honey-300); }
.detail-tabs {
  display:flex; gap:0; border-bottom:1px solid var(--honey-200);
  background:rgba(255,255,255,.08);
}
.detail-tab {
  padding:10px 22px; border:none; background:transparent;
  color:var(--brown-700); cursor:pointer; font-size:13px;
  font-family:inherit; font-weight:500; position:relative;
  transition:color .2s;
}
.detail-tab:hover { color:var(--honey-700); }
.detail-tab.active {
  color:var(--honey-700); font-weight:600;
}
.detail-tab.active::after {
  content:''; position:absolute; bottom:-1px; left:12px; right:12px;
  height:2px; background:var(--honey-500); border-radius:2px;
}
.detail-content { padding:16px 20px; }

/* Store list inside detail */
.store-list-item {
  display:grid; grid-template-columns: 32px 1.2fr 1.5fr 1fr auto;
  gap:14px; align-items:center; padding:12px 0;
  border-bottom:1px solid var(--brown-100);
  font-size:13px;
}
.store-list-item:last-child { border-bottom:none; }
.store-num {
  width:28px; height:28px; border-radius:8px;
  background:var(--honey-100); color:var(--honey-700);
  font-size:11px; font-weight:600;
  display:flex; align-items:center; justify-content:center;
}
.store-owner { font-weight:600; color:var(--brown-800); }
.store-address { color:var(--brown-700); font-size:12px; line-height:1.4; }
.store-city-tag {
  padding:3px 10px; border-radius:8px; font-size:11px; font-weight:500;
  background:var(--honey-50); color:var(--honey-700);
  border:1px solid var(--honey-200); white-space:nowrap;
}
.btn-map {
  padding:6px 12px; border-radius:8px; border:1px solid var(--honey-300);
  background:var(--honey-50); color:var(--honey-700); cursor:pointer;
  font-size:11px; font-family:inherit; font-weight:500; white-space:nowrap;
  transition:all .2s; display:flex; align-items:center; gap:4px;
}
.btn-map:hover { background:var(--honey-200); border-color:var(--honey-400); }

/* Map container */
.map-container {
  width:100%; height:400px; border-radius:12px; overflow:hidden;
  border:2px solid var(--honey-200); margin-top:10px;
}
.map-container .leaflet-container { height:100%; width:100%; }

/* ===== BAR CHARTS ===== */
.chart-bar-container { display:flex; flex-direction:column; gap:10px; }
.chart-bar-row { display:flex; align-items:center; gap:12px; }
.chart-bar-label {
  width:115px; font-size:12px; color:#fde68a;
  text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500;
}
.chart-bar-track { flex:1; height:28px; background:var(--cream-dark); border-radius:8px; overflow:hidden; }
.chart-bar-fill {
  height:100%; border-radius:8px;
  transition:width .8s cubic-bezier(.25,.46,.45,.94);
  display:flex; align-items:center; padding-left:10px;
  font-size:11px; font-weight:600; color:#fff;
  min-width:30px;
}
.chart-bar-count { font-size:12px; color:#fef3c7; width:34px; text-align:right; font-weight:500; }

/* ===== TABLE ===== */
.table-wrap { overflow-x:auto; border-radius:12px; border:1px solid var(--brown-100); }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th {
  background:var(--honey-50); padding:11px 14px; text-align:left;
  font-size:11px; text-transform:uppercase; letter-spacing:.8px;
  color:#fde68a; border-bottom:2px solid var(--honey-200);
  font-weight:600; position:sticky; top:0;
}
tbody td { padding:10px 14px; border-bottom:1px solid var(--brown-100); }
tbody tr:hover { background:rgba(255,255,255,.08); }
.status-badge {
  display:inline-block; padding:3px 10px; border-radius:10px;
  font-size:11px; font-weight:600;
}
.status-operative {
  background:rgba(34,197,94,.2);
  color:#86efac !important;
  border:1px solid rgba(134,239,172,.45);
}
.status-closed {
  background:rgba(248,113,113,.2);
  color:#fca5a5 !important;
  border:1px solid rgba(252,165,165,.45);
}

/* ===== RESPONSIVE ===== */
@media (max-width:900px) {
  .grid-2 { grid-template-columns:1fr; }
  .kpi-grid { grid-template-columns:repeat(2,1fr); }
  header { flex-direction:column; gap:12px; }
  .dashboard { padding:16px; }
  .store-list-item { grid-template-columns:28px 1fr; gap:6px; }
  .store-list-item .store-address, .store-list-item .store-city-tag { grid-column:2; }
}
@media (max-width:500px) { .kpi-grid { grid-template-columns:1fr; } }

.error-msg {
  padding:28px; text-align:center; color:var(--red);
  background:var(--red-light); border-radius:14px;
  border:1px solid rgba(220,38,38,.15);
}
.error-msg a { color:var(--honey-600); }
</style>
</head>
<body>

<div class="loader-overlay" id="loader">
  <div class="loader-honeycomb">
    <div class="loader-hex1"></div>
    <div class="loader-hex2"></div>
  </div>
  <div class="loader-text">Fetching live data from Google Sheets...</div>
</div>

<header>
  <div class="brand">
    <div class="brand-icon">H</div>
    <div>
      <h1>Honeyman Ice Cream</h1>
      <span>Franchise Operations Dashboard — Live Sync</span>
    </div>
  </div>
  <div class="header-right">
    <div class="sync-status" id="syncStatus">
      <div class="sync-dot loading" id="syncDot"></div>
      <span id="syncText">Connecting...</span>
    </div>
    <button class="btn-refresh" onclick="fetchData()">↻ Refresh</button>
  </div>
</header>

<div class="dashboard" id="app"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx3QWgMr_jEFTfA95wX3Lgp67Fa6xeQRCeKDuCIXryJfgzmpcV0vyVz0JqJz-6OOsSkOw/exec';

const MODEL_COLORS = {
  'Cafe Honeyman':'#b45309','Ice cream parlour':'#2563eb','Ice cream only':'#0891b2',
  'Cart 1':'#16a34a','Cart 2':'#7c3aed','Cart 3':'#db2777',
  'Kiosk':'#ea580c','Display model':'#9333ea','Distribution':'#ca8a04',
  'Distributionship':'#64748b',
};
const MODEL_ICONS = {
  'Cafe Honeyman':'☕','Ice cream parlour':'🍦','Ice cream only':'🍨',
  'Cart 1':'🛒','Cart 2':'🛒','Cart 3':'🛒',
  'Kiosk':'🏪','Display model':'📺','Distribution':'📦','Distributionship':'🚚',
};
const REGION_COLORS = {
  'NORTH INDIA':'#d97706','NORTH EAST':'#7c3aed','WEST INDIA':'#ea580c',
  'SOUTH INDIA':'#16a34a','EAST INDIA':'#db2777','CENTRAL INDIA':'#0891b2',
};

let rawData = null;
let activeModel = null;
let activeDetailTab = 'list';
let mapInstance = null;

async function fetchData() {
  const syncDot = document.getElementById('syncDot');
  const syncText = document.getElementById('syncText');
  syncDot.className = 'sync-dot loading'; syncText.textContent = 'Syncing...';
  try {
    const res = await fetch(SCRIPT_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    rawData = await res.json();
    syncDot.className = 'sync-dot';
    syncText.textContent = 'Live · ' + new Date().toLocaleTimeString();
    document.getElementById('loader').classList.add('hidden');
    activeModel = null;
    renderDashboard();
  } catch (err) {
    syncDot.className = 'sync-dot error';
    syncText.textContent = 'Error — Retry';
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('app').innerHTML = `
      <div class="error-msg">
        <strong>Could not connect to Google Sheets</strong><br><br>
        ${escHtml(err.message)}<br><br>
        <b>Troubleshooting:</b><br>
        1. Deploy Apps Script as Web App → "Anyone" access<br>
        2. Open URL directly to test: <a href="${SCRIPT_URL}" target="_blank">Script URL</a><br><br>
        <button class="btn-refresh" onclick="fetchData()" style="color:var(--brown-800)">↻ Try Again</button>
      </div>`;
  }
}

function parseSheet(sheetData) {
  if (!sheetData || sheetData.length < 2) return [];
  const headers = sheetData[0].map(h => String(h).trim());
  return sheetData.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = row[i] != null ? row[i] : ''; });
    return obj;
  });
}

function findSheet(keyword) {
  const names = Object.keys(rawData);
  // Check sheet names first
  for (const n of names) {
    if (n.toUpperCase().includes(keyword)) return { name:n, data:rawData[n] };
  }
  // Check first cell
  for (const n of names) {
    const d = rawData[n];
    if (d && d.length > 0 && String(d[0][0]||'').toUpperCase().includes(keyword))
      return { name:n, data:d };
  }
  return null;
}

function parseOperativeData(sheetData) {
  if (!sheetData || sheetData.length < 3) return [];
  let headerIdx = -1;
  for (let i = 0; i < Math.min(5, sheetData.length); i++) {
    const row = sheetData[i].map(c => String(c).toUpperCase().trim());
    if (row.includes('STATE') || row.includes('CITY') || row.includes('MODEL')) { headerIdx = i; break; }
  }
  if (headerIdx === -1) headerIdx = 1;
  const headers = sheetData[headerIdx].map(h => String(h).trim());
  const idx = (rx) => headers.findIndex(h => rx.test(h));
  const ri=idx(/region/i), si=idx(/^state$/i), ci=idx(/city/i), mi=idx(/model/i),
        oi=idx(/owner.*name/i), oni=idx(/owner.*number/i), spi=idx(/sales.*person/i),
        ai=idx(/address/i), li=idx(/loi|agreement/i), gi=idx(/google.*business/i);

  const stores = []; let curRegion = '';
  for (let i = headerIdx+1; i < sheetData.length; i++) {
    const row = sheetData[i];
    if (!row || row.every(c => c===''||c==null)) continue;
    const region = ri>=0 ? String(row[ri]||'').trim() : '';
    if (region) curRegion = region;
    const state = si>=0 ? String(row[si]||'').trim() : '';
    const city = ci>=0 ? String(row[ci]||'').trim() : '';
    const model = mi>=0 ? String(row[mi]||'').trim() : '';
    if (!state && !city && !model) continue;
    stores.push({
      region:curRegion||'Unknown', state, city, model,
      owner: oi>=0 ? String(row[oi]||'').trim() : '',
      ownerNumber: oni>=0 ? String(row[oni]||'').trim() : '',
      salesPerson: spi>=0 ? String(row[spi]||'').trim() : '',
      address: ai>=0 ? String(row[ai]||'').trim() : '',
      loi: li>=0 ? String(row[li]||'').trim() : '',
      googleProfile: gi>=0 ? String(row[gi]||'').trim() : '',
    });
  }
  return stores;
}

function countBy(arr, key) {
  const m = {};
  arr.forEach(x => { const v=x[key]||'Unknown'; m[v]=(m[v]||0)+1; });
  return Object.entries(m).sort((a,b) => b[1]-a[1]);
}

function renderDashboard() {
  if (!rawData) return;
  const sheets = Object.keys(rawData);
  const opSheet = findSheet('OPERATIVE') || { name:sheets[0], data:rawData[sheets[0]] };
  const closedSheet = findSheet('CLOSED') || findSheet('CLOSE');
  const statusSheet = findSheet('STATUS');

  const opStores = parseOperativeData(opSheet.data);
  const clStores = closedSheet ? parseOperativeData(closedSheet.data) : [];
  const statusData = statusSheet ? parseSheet(statusSheet.data) : [];

  const totalOp = opStores.length, totalCl = clStores.length;
  const modelDist = countBy(opStores,'model');
  const closedModelDist = countBy(clStores,'model');
  const stateDist = countBy(opStores,'state');
  const regionDist = countBy(opStores,'region');
  const cityDist = countBy(opStores,'city');
  const salesDist = countBy(opStores.filter(s=>s.salesPerson),'salesPerson');
  const loiYes = opStores.filter(s=>/yes/i.test(s.loi)).length;
  const loiNo = opStores.filter(s=>/no/i.test(s.loi)).length;
  const gbpDone = opStores.filter(s=>/done/i.test(s.googleProfile)).length;

  let h = '';

  // ===== KPIs =====
  h += `<div class="kpi-grid">
    <div class="kpi-card" style="--card-accent:var(--green)">
      <div class="kpi-label">Operative Stores</div>
      <div class="kpi-value" style="color:var(--green)">${totalOp}</div>
      <div class="kpi-sub">Active franchise locations</div>
    </div>
    <div class="kpi-card" style="--card-accent:var(--red)">
      <div class="kpi-label">Closed Deals</div>
      <div class="kpi-value" style="color:var(--red)">${totalCl}</div>
      <div class="kpi-sub">${closedSheet ? closedSheet.name : 'No sheet found'}</div>
    </div>
    <div class="kpi-card" style="--card-accent:var(--blue)">
      <div class="kpi-label">States</div>
      <div class="kpi-value" style="color:var(--blue)">${stateDist.length}</div>
      <div class="kpi-sub">${regionDist.length} regions</div>
    </div>
    <div class="kpi-card" style="--card-accent:var(--purple)">
      <div class="kpi-label">Cities</div>
      <div class="kpi-value" style="color:var(--purple)">${cityDist.length}</div>
      <div class="kpi-sub">Unique locations</div>
    </div>
    
  </div>`;

  // ===== STORE STATUS TABLE =====
  if (statusData.length > 0) {
    const sHeaders = Object.keys(statusData[0]).filter(k=>String(k).trim());
    h += `<div class="card" style="margin-bottom:28px">
      <div class="section-title">Store Status <span class="badge">LIVE — ${statusSheet.name}</span></div>
      <div class="table-wrap" style="max-height:450px;overflow-y:auto"><table><thead><tr>`;
    sHeaders.forEach(k => h += `<th>${escHtml(k)}</th>`);
    h += `</tr></thead><tbody>`;
    statusData.forEach(row => {
      const vals = sHeaders.map(k=>String(row[k]||'').trim());
      if (vals.every(v=>!v)) return;
      h += '<tr>';
      sHeaders.forEach(k => {
        const v = String(row[k]||'').trim();
        const up = v.toUpperCase();
        let cell = escHtml(v);
        if (['OPERATIVE','OPEN','ACTIVE','RUNNING'].includes(up)) cell=`<span class="status-badge status-operative">${escHtml(v)}</span>`;
        else if (['CLOSED','CLOSE','INACTIVE','SHUT'].includes(up)) cell=`<span class="status-badge status-closed">${escHtml(v)}</span>`;
        h += `<td>${cell}</td>`;
      });
      h += '</tr>';
    });
    h += `</tbody></table></div></div>`;
  }

  // ===== MODEL-WISE DISTRIBUTION — CLICKABLE CARDS =====
  h += `<div class="card" style="margin-bottom:28px">
    <div class="section-title">Model-wise Distribution — Operative <span class="badge">Click to explore</span></div>
    <div class="model-cards-grid" id="modelCardsOp">`;
  modelDist.forEach(([model, count]) => {
    const color = MODEL_COLORS[model]||'#78350f';
    const icon = MODEL_ICONS[model]||'🏠';
    const isActive = activeModel === 'op__'+model;
    h += `<div class="model-card${isActive?' active':''}" onclick="toggleModel('op','${escAttr(model)}')">
      <div class="model-card-icon" style="background:${color}">${icon}</div>
      <div class="model-card-name">${escHtml(model||'Unknown')}</div>
      <div class="model-card-count">${count}</div>
      <div class="model-card-label">stores</div>
    </div>`;
  });
  h += `</div><div id="modelDetailOp"></div></div>`;

  // ===== MODEL-WISE DISTRIBUTION — CLOSED =====
  if (closedModelDist.length > 0) {
    h += `<div class="card" style="margin-bottom:28px">
      <div class="section-title">Model-wise Distribution — Closed <span class="badge">${totalCl} total</span></div>
      <div class="model-cards-grid" id="modelCardsCl">`;
    closedModelDist.forEach(([model, count]) => {
      const color = MODEL_COLORS[model]||'#78350f';
      const icon = MODEL_ICONS[model]||'🏠';
      const isActive = activeModel === 'cl__'+model;
      h += `<div class="model-card${isActive?' active':''}" onclick="toggleModel('cl','${escAttr(model)}')" style="opacity:.85">
        <div class="model-card-icon" style="background:${color}">${icon}</div>
        <div class="model-card-name">${escHtml(model||'Unknown')}</div>
        <div class="model-card-count">${count}</div>
        <div class="model-card-label">closed</div>
      </div>`;
    });
    h += `</div><div id="modelDetailCl"></div></div>`;
  }

  // ===== REGION & STATE CHARTS =====
  h += `<div class="grid-2">
    <div class="card">
      <div class="section-title">Region Distribution</div>
      <div class="chart-bar-container">`;
  regionDist.forEach(([r,c]) => {
    const pct = Math.round(c/totalOp*100);
    const col = REGION_COLORS[r]||'#b45309';
    h += `<div class="chart-bar-row">
      <div class="chart-bar-label">${escHtml(r)}</div>
      <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${Math.max(pct,6)}%;background:${col}">${c}</div></div>
      <div class="chart-bar-count">${pct}%</div></div>`;
  });
  h += `</div></div><div class="card">
    <div class="section-title">Top States <span class="badge">${stateDist.length}</span></div>
    <div class="chart-bar-container">`;
  const maxSt = stateDist[0]?.[1]||1;
  stateDist.slice(0,12).forEach(([s,c]) => {
    const pct = Math.round(c/maxSt*100);
    h += `<div class="chart-bar-row">
      <div class="chart-bar-label">${escHtml(s)}</div>
      <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${Math.max(pct,6)}%;background:var(--honey-500)">${c}</div></div></div>`;
  });
  h += `</div></div></div>`;

  // ===== SALES PERFORMANCE =====
  // if (salesDist.length > 0) {
  //   const maxSa = salesDist[0][1];
  //   h += `<div class="card" style="margin-bottom:28px">
  //     <div class="section-title">Sales Team</div>
  //     <div class="chart-bar-container">`;
  //   salesDist.forEach(([p,c]) => {
  //     const pct = Math.round(c/maxSa*100);
  //     h += `<div class="chart-bar-row">
  //       <div class="chart-bar-label">${escHtml(p)}</div>
  //       <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${Math.max(pct,8)}%;background:var(--purple)">${c}</div></div></div>`;
  //   });
  //   h += `</div></div>`;
  // }

  // ===== SHEETS DETECTED =====
  h += `<div class="card"><div class="section-title">Sheets in Workbook</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px">`;
  sheets.forEach(s => h += `<span style="padding:6px 14px;border-radius:8px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.45);font-size:12px;font-weight:500;color:#fff">${escHtml(s)}</span>`);
  h += `</div></div>`;

  document.getElementById('app').innerHTML = h;

  // Re-render active detail panel if one was open
  if (activeModel) {
    const [type, model] = activeModel.split('__');
    renderModelDetail(type, model);
  }
}

function toggleModel(type, model) {
  const key = type + '__' + model;
  if (activeModel === key) { activeModel = null; renderDashboard(); return; }
  activeModel = key;
  renderDashboard();
}

function renderModelDetail(type, model) {
  const containerId = type === 'op' ? 'modelDetailOp' : 'modelDetailCl';
  const container = document.getElementById(containerId);
  if (!container) return;

  const sheets = Object.keys(rawData);
  let stores;
  if (type === 'op') {
    const opSheet = findSheet('OPERATIVE') || { name:sheets[0], data:rawData[sheets[0]] };
    stores = parseOperativeData(opSheet.data).filter(s => s.model === model);
  } else {
    const clSheet = findSheet('CLOSED') || findSheet('CLOSE');
    stores = clSheet ? parseOperativeData(clSheet.data).filter(s => s.model === model) : [];
  }

  if (!stores.length) { container.innerHTML = ''; return; }

  const color = MODEL_COLORS[model] || '#78350f';
  const icon = MODEL_ICONS[model] || '🏠';

  let dh = `<div class="model-detail-panel">
    <div class="model-detail-header">
      <h3>${icon} ${escHtml(model)} — ${stores.length} ${type==='op'?'Operative':'Closed'} Stores</h3>
      <button class="btn-close-detail" onclick="activeModel=null;renderDashboard()">✕</button>
    </div>
    <div class="detail-tabs">
      <button class="detail-tab${activeDetailTab==='list'?' active':''}" onclick="activeDetailTab='list';renderModelDetail('${type}','${escAttr(model)}')">📋 Store List</button>
      <button class="detail-tab${activeDetailTab==='map'?' active':''}" onclick="activeDetailTab='map';renderModelDetail('${type}','${escAttr(model)}')">🗺️ Map View</button>
    </div>
    <div class="detail-content">`;

  if (activeDetailTab === 'list') {
    stores.forEach((s, i) => {
      dh += `<div class="store-list-item">
        <div class="store-num">${i+1}</div>
        <div>
          <div class="store-owner">${escHtml(s.owner||'—')}</div>
          <div style="font-size:11px;color:var(--brown-200);margin-top:2px">${escHtml(s.ownerNumber||'')}</div>
        </div>
        <div class="store-address">${escHtml(s.address||'No address')}</div>
        <div class="store-city-tag">${escHtml(s.city)}, ${escHtml(s.state)}</div>
        <button class="btn-map" onclick="showSingleMap('${escAttr(s.city)}','${escAttr(s.state)}','${escAttr(s.address)}','${escAttr(s.owner)}')">📍 Map</button>
      </div>`;
    });
  } else {
    dh += `<div id="mapContainer_${type}" class="map-container" style="height:450px"></div>`;
  }

  dh += `</div></div>`;
  container.innerHTML = dh;

  // Highlight active model card
  const cardsGrid = document.getElementById(type === 'op' ? 'modelCardsOp' : 'modelCardsCl');
  if (cardsGrid) {
    cardsGrid.querySelectorAll('.model-card').forEach(card => {
      const name = card.querySelector('.model-card-name').textContent;
      card.classList.toggle('active', name === model);
    });
  }

  if (activeDetailTab === 'map') {
    setTimeout(() => initMapForStores(stores, type), 100);
  }
}

function initMapForStores(stores, type) {
  const mapEl = document.getElementById('mapContainer_' + type);
  if (!mapEl) return;

  if (mapInstance) { mapInstance.remove(); mapInstance = null; }
  mapInstance = L.map(mapEl).setView([22.5, 78.9], 5);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 18
  }).addTo(mapInstance);

  const bounds = [];
  let geocoded = 0;

  stores.forEach((s, i) => {
    const query = [s.address, s.city, s.state, 'India'].filter(Boolean).join(', ');
    const searchQ = encodeURIComponent(s.city + ', ' + s.state + ', India');

    fetch(`https://nominatim.openstreetmap.org/search?q=${searchQ}&format=json&limit=1`)
      .then(r => r.json())
      .then(data => {
        geocoded++;
        if (data && data.length > 0) {
          const lat = parseFloat(data[0].lat);
          const lon = parseFloat(data[0].lon);
          bounds.push([lat, lon]);

          const honeyIcon = L.divIcon({
            className: 'custom-marker',
            html: `<div style="
              background:${MODEL_COLORS[s.model]||'#b45309'};
              color:#fff; width:28px; height:28px; border-radius:50%;
              display:flex; align-items:center; justify-content:center;
              font-size:13px; font-weight:700; border:2px solid #fff;
              box-shadow:0 2px 8px rgba(0,0,0,.3);
            ">${i+1}</div>`,
            iconSize: [28, 28],
            iconAnchor: [14, 14],
          });

          L.marker([lat, lon], { icon: honeyIcon })
            .addTo(mapInstance)
            .bindPopup(`
              <div style="font-family:Outfit,sans-serif;min-width:200px">
                <div style="font-weight:700;font-size:14px;margin-bottom:4px;color:#78350f">${escHtml(s.owner||'Unknown')}</div>
                <div style="font-size:12px;color:#92400e;margin-bottom:6px">${escHtml(s.model)}</div>
                <div style="font-size:11px;color:#6b4423;line-height:1.5">${escHtml(s.address||'—')}</div>
                <div style="margin-top:6px;font-size:11px;font-weight:600;color:#b45309">${escHtml(s.city)}, ${escHtml(s.state)}</div>
                ${s.ownerNumber ? `<div style="margin-top:4px;font-size:11px;color:#64748b">📞 ${escHtml(s.ownerNumber)}</div>` : ''}
              </div>
            `);
        }

        if (geocoded === stores.length && bounds.length > 0) {
          mapInstance.fitBounds(bounds, { padding: [30, 30] });
        }
      })
      .catch(() => { geocoded++; });
  });
}

function showSingleMap(city, state, address, owner) {
  const query = encodeURIComponent(city + ', ' + state + ', India');
  const popup = document.createElement('div');
  popup.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:20px;';
  popup.onclick = (e) => { if (e.target === popup) popup.remove(); };
  popup.innerHTML = `
    <div style="background:#fff;border-radius:16px;width:700px;max-width:95vw;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <div style="padding:16px 20px;background:var(--honey-100);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--honey-200)">
        <div>
          <div style="font-family:Cormorant Garamond,serif;font-size:18px;font-weight:700;color:#fde68a">📍 ${escHtml(owner)}</div>
          <div style="font-size:12px;color:var(--brown-700);margin-top:2px">${escHtml(city)}, ${escHtml(state)}</div>
        </div>
        <button onclick="this.closest('div[style]').parentElement.remove()" style="width:32px;height:32px;border-radius:8px;border:none;background:var(--honey-200);cursor:pointer;font-size:16px;font-weight:700;color:var(--brown-800)">✕</button>
      </div>
      <div style="padding:12px 20px;font-size:12px;color:var(--brown-700);background:var(--honey-50)">${escHtml(address)}</div>
      <div id="singleMapPopup" style="height:400px;width:100%"></div>
    </div>`;
  document.body.appendChild(popup);

  setTimeout(() => {
    const mapEl = document.getElementById('singleMapPopup');
    const sMap = L.map(mapEl).setView([22.5, 78.9], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution:'© OpenStreetMap', maxZoom:18
    }).addTo(sMap);

    fetch(`https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=1`)
      .then(r => r.json())
      .then(data => {
        if (data && data.length > 0) {
          const lat = parseFloat(data[0].lat);
          const lon = parseFloat(data[0].lon);
          sMap.setView([lat, lon], 13);
          const icon = L.divIcon({
            className:'custom-marker',
            html:`<div style="background:#b45309;color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.3)">📍</div>`,
            iconSize:[32,32], iconAnchor:[16,16]
          });
          L.marker([lat, lon], { icon }).addTo(sMap)
            .bindPopup(`<b>${escHtml(owner)}</b><br>${escHtml(city)}, ${escHtml(state)}<br><small>${escHtml(address)}</small>`)
            .openPopup();
        }
      });
  }, 200);
}

function escHtml(str) { const d=document.createElement('div'); d.textContent=String(str||''); return d.innerHTML; }
function escAttr(str) { return String(str||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

setInterval(fetchData, 5*60*1000);
fetchData();
</script>
